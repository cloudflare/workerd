name: Tests

on:
  pull_request:
    paths:
      - src/**
  push:
    branches:
    - main

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - name: Setup Linux
        run: |
          sudo apt-get install -y --no-install-recommends clang-format-18
      - name: Lint
        run: |
          python3 ./tools/cross/format.py --check
